<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Chain Reaction strategy game built using HTML, CSS and JavaScript."
    >

    <link
        rel="icon"
        href="favicon.ico"
    >

    <title>Chain Reaction</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Chain Reaction</h1>

    <div id="controls">

        <button id="pvpBtn">
            2 Player
        </button>

        <button id="aiBtn">
            Player vs AI
        </button>

        <input
            type="number"
            id="playerCountInput"
            min="2"
            max="8"
            value="4"
        >

        <button id="customMultiBtn">
            Start Multiplayer
        </button>

    </div>

    <h2 id="turnText"></h2>

    <h3 id="scoreText"></h3>

    <h3 id="timerText"></h3>

    <button id="pauseBtn">
        Pause
    </button>

    <button id="resumeBtn">
        Resume
    </button>

    <div id="history"></div>

    <div id="board"></div>

    <script src="state_manager.js"></script>

    <script src="game_engine.js"></script>

    <script src="ui_controller.js"></script>

    <script src="event_handler.js"></script>

</body>

</html>
